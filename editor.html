<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Editor</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/editor.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="editor-container">

<div class="editor-sidebar">
<h3>Edit Portfolio</h3>

<input type="text" id="nameInput" placeholder="Your Name" class="form-control mb-3">

<textarea id="bioInput" class="form-control mb-3" rows="4" placeholder="Your Bio"></textarea>

<input type="text" id="skillInput" placeholder="Add Skills" class="form-control mb-3">

<button class="btn btn-primary w-100 mb-3" id="saveBtn">
Save Portfolio
</button>

<button class="btn btn-success w-100 mb-3" id="exportBtn">
Export HTML
</button>

<button class="btn btn-warning w-100" id="themeBtn">
Toggle Theme
</button>
</div>

<div class="preview-area">

<div class="portfolio-preview" id="portfolioPreview">

<div class="hero-preview draggable">
<h1 id="previewName">Your Name</h1>
<p id="previewBio">
Your professional bio will appear here.
</p>
</div>

<div class="skills-section draggable">
<h2>Skills</h2>
<ul id="skillsList">
<li>HTML</li>
<li>CSS</li>
<li>JavaScript</li>
</ul>
</div>

<div class="projects-section draggable">
<h2>Projects</h2>
<div class="project-card">
<h4>Portfolio Website</h4>
<p>Modern responsive portfolio project.</p>
</div>
</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="js/editor.js"></script>

</body>
</html>
